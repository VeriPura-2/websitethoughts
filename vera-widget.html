<!-- ─────────────────────────────────────────────
     VERA — VeriPura Qualification Widget
     Paste this block just before </body> on any page
     ───────────────────────────────────────────── -->
<style>
  /* ── WIDGET SHELL ── */
  #vera-launcher {
    position: fixed; bottom: 28px; right: 28px; z-index: 9999;
    display: flex; flex-direction: column; align-items: flex-end; gap: 12px;
  }

  /* Pulse ring behind FAB */
  #vera-fab {
    width: 58px; height: 58px; border-radius: 50%;
    background: linear-gradient(135deg, #D4A847 0%, #e8c060 100%);
    border: none; cursor: pointer;
    box-shadow: 0 4px 20px rgba(212,168,71,0.5);
    display: flex; align-items: center; justify-content: center;
    position: relative; transition: transform 0.2s, box-shadow 0.2s;
    font-size: 0;
  }
  #vera-fab:hover { transform: scale(1.07); box-shadow: 0 6px 28px rgba(212,168,71,0.65); }
  #vera-fab::before {
    content: ''; position: absolute; inset: -6px; border-radius: 50%;
    border: 2px solid rgba(212,168,71,0.35);
    animation: vera-pulse 2.4s ease-in-out infinite;
  }
  @keyframes vera-pulse {
    0%,100% { transform: scale(1); opacity: 0.7; }
    50% { transform: scale(1.18); opacity: 0; }
  }
  #vera-fab svg { width: 26px; height: 26px; pointer-events: none; }

  /* Tooltip */
  #vera-tooltip {
    background: #0F2444; color: #D6E4F0;
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 0.78rem; font-weight: 500;
    padding: 7px 14px; border-radius: 20px;
    white-space: nowrap; pointer-events: none;
    box-shadow: 0 2px 12px rgba(0,0,0,0.25);
    opacity: 0; transition: opacity 0.2s;
  }
  #vera-fab:hover + #vera-tooltip,
  #vera-launcher:hover #vera-tooltip { opacity: 1; }

  /* ── CHAT PANEL ── */
  #vera-panel {
    position: fixed; bottom: 100px; right: 28px; z-index: 9998;
    width: 360px; max-height: 560px;
    background: #0F2444;
    border: 1px solid rgba(214,228,240,0.15);
    border-radius: 14px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.45), 0 0 0 1px rgba(212,168,71,0.1);
    display: flex; flex-direction: column; overflow: hidden;
    transform: translateY(16px) scale(0.97); opacity: 0;
    pointer-events: none;
    transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), opacity 0.22s ease;
  }
  #vera-panel.open {
    transform: translateY(0) scale(1); opacity: 1; pointer-events: all;
  }

  /* Header */
  #vera-header {
    background: linear-gradient(135deg, #1F3864 0%, #0F2444 100%);
    padding: 16px 18px; display: flex; align-items: center; gap: 12px;
    border-bottom: 1px solid rgba(214,228,240,0.1);
    flex-shrink: 0;
  }
  #vera-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, #D4A847, #e8c060);
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 1rem; color: #0F2444; font-weight: 700;
    flex-shrink: 0; position: relative;
  }
  #vera-avatar::after {
    content: ''; position: absolute; bottom: 1px; right: 1px;
    width: 9px; height: 9px; border-radius: 50%;
    background: #3ab86a; border: 2px solid #0F2444;
  }
  #vera-header-text { flex: 1; }
  #vera-name {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: 0.95rem; color: #FFFFFF; line-height: 1.2;
  }
  #vera-status {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: #3ab86a;
  }
  #vera-close {
    background: none; border: none; cursor: pointer; padding: 4px;
    color: rgba(214,228,240,0.5); transition: color 0.2s; line-height: 1;
  }
  #vera-close:hover { color: #D6E4F0; }

  /* Messages */
  #vera-messages {
    flex: 1; overflow-y: auto; padding: 16px 16px 8px;
    display: flex; flex-direction: column; gap: 10px;
    scrollbar-width: thin; scrollbar-color: rgba(214,228,240,0.15) transparent;
  }
  #vera-messages::-webkit-scrollbar { width: 4px; }
  #vera-messages::-webkit-scrollbar-thumb { background: rgba(214,228,240,0.15); border-radius: 2px; }

  .vera-msg {
    max-width: 88%; line-height: 1.55; animation: vera-msgIn 0.22s ease;
  }
  @keyframes vera-msgIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .vera-msg.vera { align-self: flex-start; }
  .vera-msg.user { align-self: flex-end; }

  .vera-msg.vera .vera-bubble {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(214,228,240,0.12);
    color: #D6E4F0;
    border-radius: 4px 14px 14px 14px;
    padding: 10px 14px;
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 0.84rem;
  }
  .vera-msg.user .vera-bubble {
    background: #D4A847; color: #0F2444;
    border-radius: 14px 14px 4px 14px;
    padding: 10px 14px;
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 0.84rem; font-weight: 500;
  }
  .vera-sender {
    font-family: 'DM Mono', monospace;
    font-size: 0.58rem; letter-spacing: 0.1em; text-transform: uppercase;
    color: rgba(214,228,240,0.4); margin-bottom: 4px;
  }
  .vera-msg.user .vera-sender { text-align: right; }

  /* Quick replies */
  #vera-quick-replies {
    padding: 8px 16px; display: flex; flex-wrap: wrap; gap: 6px;
    flex-shrink: 0;
  }
  .vera-qr {
    background: transparent;
    border: 1px solid rgba(212,168,71,0.4);
    color: #D4A847;
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 0.76rem; font-weight: 500;
    padding: 5px 12px; border-radius: 20px;
    cursor: pointer; transition: background 0.18s, border-color 0.18s;
    white-space: nowrap;
  }
  .vera-qr:hover { background: rgba(212,168,71,0.12); border-color: #D4A847; }

  /* Input */
  #vera-input-row {
    padding: 10px 14px 14px; display: flex; gap: 8px; align-items: center;
    border-top: 1px solid rgba(214,228,240,0.08); flex-shrink: 0;
  }
  #vera-input {
    flex: 1; background: rgba(255,255,255,0.07);
    border: 1px solid rgba(214,228,240,0.15);
    border-radius: 8px; color: #D6E4F0;
    font-family: 'DM Sans', system-ui, sans-serif; font-size: 0.84rem;
    padding: 8px 12px; outline: none; resize: none;
    transition: border-color 0.2s; line-height: 1.4; min-height: 36px; max-height: 90px;
  }
  #vera-input::placeholder { color: rgba(214,228,240,0.3); }
  #vera-input:focus { border-color: rgba(212,168,71,0.5); }
  #vera-send {
    width: 34px; height: 34px; border-radius: 8px;
    background: #D4A847; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.2s, transform 0.15s;
  }
  #vera-send:hover { background: #e0b84e; transform: scale(1.05); }
  #vera-send svg { width: 15px; height: 15px; color: #0F2444; }

  /* Typing indicator */
  .vera-typing .vera-bubble {
    display: flex; gap: 4px; align-items: center; padding: 12px 16px !important;
  }
  .vera-typing .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: rgba(214,228,240,0.4);
    animation: vera-dot 1.2s ease-in-out infinite;
  }
  .vera-typing .dot:nth-child(2) { animation-delay: 0.2s; }
  .vera-typing .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes vera-dot {
    0%,60%,100% { transform: translateY(0); opacity: 0.4; }
    30% { transform: translateY(-5px); opacity: 1; }
  }

  /* CTA block */
  .vera-cta-block {
    background: rgba(212,168,71,0.1);
    border: 1px solid rgba(212,168,71,0.3);
    border-radius: 10px; padding: 14px;
    display: flex; flex-direction: column; gap: 8px;
    margin-top: 4px;
  }
  .vera-cta-block a {
    display: block; text-align: center; padding: 9px 14px;
    background: #D4A847; color: #0F2444;
    font-family: 'DM Sans', system-ui, sans-serif;
    font-size: 0.78rem; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    text-decoration: none; border-radius: 6px;
    transition: background 0.2s;
  }
  .vera-cta-block a:hover { background: #e0b84e; }
  .vera-cta-block a.secondary {
    background: transparent; color: #D4A847;
    border: 1px solid rgba(212,168,71,0.4);
  }
  .vera-cta-block a.secondary:hover { background: rgba(212,168,71,0.1); }
</style>

<!-- Widget HTML -->
<div id="vera-launcher">
  <button id="vera-fab" aria-label="Chat with Vera">
    <svg viewBox="0 0 24 24" fill="none" stroke="#0F2444" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
    </svg>
  </button>
  <div id="vera-tooltip">Talk to Vera</div>
</div>

<div id="vera-panel" role="dialog" aria-label="Chat with Vera">
  <div id="vera-header">
    <div id="vera-avatar">V</div>
    <div id="vera-header-text">
      <div id="vera-name">Vera — VeriPura</div>
      <div id="vera-status">● Online</div>
    </div>
    <button id="vera-close" aria-label="Close chat">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
  </div>
  <div id="vera-messages"></div>
  <div id="vera-quick-replies"></div>
  <div id="vera-input-row">
    <textarea id="vera-input" placeholder="Type a message…" rows="1"></textarea>
    <button id="vera-send" aria-label="Send">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

<script>
(function() {
  const SYSTEM_PROMPT = `You are Vera, a qualification assistant for VeriPura — an AI-powered food import compliance platform. You are embedded as a floating chat widget on the VeriPura website.

Your purpose is to qualify visitors by understanding who they are and what they need, then route them to the right next step. You are warm, precise, and professional — never pushy.

VISITOR TYPES you will encounter:
1. FOOD IMPORTERS — companies importing food into EU or US from high-risk sourcing corridors (Thailand, Vietnam, Brazil, India, Indonesia, Mexico). They struggle with documentation compliance, FDA detentions, EU TRACES rejections.
2. FREIGHT FORWARDERS / CUSTOMS BROKERS / CARRIERS — logistics companies who handle food shipments and want to offer compliance as a service to their clients.
3. INVESTORS — people exploring VeriPura as an investment opportunity.
4. GENERAL / UNKNOWN — journalists, researchers, competitors, or people just exploring.

QUALIFICATION FLOW:
- Start with a warm, brief introduction (2 sentences max). Ask what brings them to VeriPura today.
- Based on their answer, ask 2–3 targeted qualifying questions to understand:
  - For importers: what corridors they source from, what compliance problems they face, shipment volume
  - For forwarders: how many food importer clients they have, what corridors they operate in, whether they currently offer compliance services
  - For investors: what stage they are interested in, whether they are a VC/angel/family office
- Keep each message SHORT — 2-4 sentences maximum. Never use bullet lists in chat. Conversational tone only.
- After 3–4 exchanges, make a qualification judgment and offer the appropriate CTA.

CTA ROUTING — when you are ready to route, output ONLY the following JSON on its own line (the UI will intercept it):
For qualified importer: {"cta":"importer","label":"Book a Demo","url":"https://veripura.youcanbook.me/","secondary":"See How It Works","secondary_url":"#workflow"}
For qualified partner: {"cta":"partner","label":"Apply to Partner","url":"partners.html#partner-form","secondary":"Read the Programme","secondary_url":"partners.html"}
For investor: {"cta":"investor","label":"Request Investor Pack","url":"#contact","secondary":"View Whitepaper","secondary_url":"https://medium.com/@info_73854/veripura-whitepaper-8f08c1bb7e2c"}
For unqualified/unknown: {"cta":"general","label":"Explore VeriPura","url":"#workflow","secondary":"Contact Us","secondary_url":"#contact"}

RULES:
- Never claim VeriPura is "SaaS"
- Never invent statistics — refer only to FDA $30K–$50K detention costs, 39% documentation failure rate, 14,000+ EU refusals in 2024, 14-day contamination trace average
- Never mention competitor products by name
- If someone is rude or clearly not a prospect, politely wish them well and close
- Do not output the JSON until you have asked at least 2 qualifying questions`;

  const history = [];
  let isOpen = false;
  let isTyping = false;

  const fab = document.getElementById('vera-fab');
  const panel = document.getElementById('vera-panel');
  const closeBtn = document.getElementById('vera-close');
  const messages = document.getElementById('vera-messages');
  const qrRow = document.getElementById('vera-quick-replies');
  const input = document.getElementById('vera-input');
  const sendBtn = document.getElementById('vera-send');

  function openPanel() {
    isOpen = true;
    panel.classList.add('open');
    fab.style.display = 'none';
    if (messages.children.length === 0) startConversation();
    setTimeout(() => input.focus(), 300);
  }

  function closePanel() {
    isOpen = false;
    panel.classList.remove('open');
    fab.style.display = 'flex';
  }

  fab.addEventListener('click', openPanel);
  closeBtn.addEventListener('click', closePanel);

  function addMessage(role, text) {
    const wrap = document.createElement('div');
    wrap.className = `vera-msg ${role === 'assistant' ? 'vera' : 'user'}`;

    const sender = document.createElement('div');
    sender.className = 'vera-sender';
    sender.textContent = role === 'assistant' ? 'Vera' : 'You';

    const bubble = document.createElement('div');
    bubble.className = 'vera-bubble';
    bubble.textContent = text;

    wrap.appendChild(sender);
    wrap.appendChild(bubble);
    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;
    return wrap;
  }

  function showTyping() {
    hideTyping();
    const wrap = document.createElement('div');
    wrap.className = 'vera-msg vera vera-typing';
    wrap.id = 'vera-typing-indicator';
    wrap.innerHTML = '<div class="vera-sender">Vera</div><div class="vera-bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>';
    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('vera-typing-indicator');
    if (el) el.remove();
  }

  function showCTA(data) {
    const block = document.createElement('div');
    block.className = 'vera-cta-block';
    block.innerHTML = `
      <a href="${data.url}">${data.label}</a>
      <a href="${data.secondary_url}" class="secondary">${data.secondary}</a>
    `;

    const wrap = document.createElement('div');
    wrap.className = 'vera-msg vera';
    wrap.appendChild(block);
    messages.appendChild(wrap);
    messages.scrollTop = messages.scrollHeight;

    if (data.cta === 'importer') {
      const qrWrap = document.createElement('div');
      qrWrap.style.cssText = 'margin-top:1rem; text-align:center;';
      qrWrap.innerHTML = `
        <a href="https://veripura.youcanbook.me/" target="_blank" rel="noopener">
          <div style="width:140px;height:140px;margin:0 auto;border-radius:8px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;color:#D6E4F0;font-family:'DM Sans',system-ui,sans-serif;font-size:0.8rem;border:1px solid rgba(214,228,240,0.15);">
            Book a call
          </div>
        </a>
        <p style="margin-top:0.5rem; font-family:'DM Mono',monospace; font-size:0.58rem; color:rgba(214,228,240,0.6); letter-spacing:0.08em; text-transform:uppercase;">
          Click to book a call
        </p>
      `;
      messages.appendChild(qrWrap);
      messages.scrollTop = messages.scrollHeight;
    }
  }

  function setQuickReplies(options) {
    qrRow.innerHTML = '';
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'vera-qr';
      btn.textContent = opt;
      btn.addEventListener('click', () => {
        setQuickReplies([]);
        sendMessage(opt);
      });
      qrRow.appendChild(btn);
    });
  }

  async function callClaude(userMessage) {
    history.push({ role: 'user', content: userMessage });
    isTyping = true;
    showTyping();

    try {
      const response = await fetch('https://veripura-chat.tomsoberlin.workers.dev/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          source: 'veripura',
          session_id: window.__veraSessionId || (window.__veraSessionId = Date.now().toString()),
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          system: SYSTEM_PROMPT,
          messages: history
        })
      });

      const data = await response.json();

      hideTyping();
      isTyping = false;

      if (!response.ok) {
        console.error('Vera worker error:', data);
        addMessage('assistant', "I'm having a brief technical issue — please try again in a moment.");
        return;
      }

      const raw = data.content?.[0]?.text || "I'm having a brief technical issue — please try again in a moment.";

      const jsonMatch = raw.match(/\{.*"cta".*\}/s);
      if (jsonMatch) {
        try {
          const ctaData = JSON.parse(jsonMatch[0]);
          const textOnly = raw.replace(jsonMatch[0], '').trim();

          if (textOnly) {
            addMessage('assistant', textOnly);
            history.push({ role: 'assistant', content: textOnly });
          }

          showCTA(ctaData);
          setQuickReplies([]);
          return;
        } catch (e) {
          console.error('CTA parse failed:', e);
        }
      }

      addMessage('assistant', raw);
      history.push({ role: 'assistant', content: raw });

      if (history.length === 2) {
        setQuickReplies([
          "I'm a food importer",
          "I'm a freight forwarder",
          "I'm looking to invest",
          "Just exploring"
        ]);
      }

    } catch (err) {
      console.error('Vera fetch failed:', err);
      hideTyping();
      isTyping = false;
      addMessage('assistant', "I'm having a brief technical issue — please try again in a moment.");
    }
  }

  function sendMessage(text) {
    const msg = (text || input.value).trim();
    if (!msg || isTyping) return;
    input.value = '';
    input.style.height = 'auto';
    setQuickReplies([]);
    addMessage('user', msg);
    callClaude(msg);
  }

  sendBtn.addEventListener('click', () => sendMessage());
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 90) + 'px';
  });

  function startConversation() {
    callClaude("Hello, I just arrived on the VeriPura website.");
  }
})();
</script>
<!-- ── END VERA WIDGET ── -->
